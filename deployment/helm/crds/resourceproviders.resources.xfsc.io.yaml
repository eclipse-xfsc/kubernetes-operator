apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: resourceproviders.resources.xfsc.io
spec:
  group: resources.xfsc.io
  names:
    kind: ResourceProvider
    listKind: ResourceProviderList
    plural: resourceproviders
    singular: resourceprovider
    shortNames: [rp]
  scope: Cluster
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required: [type]
              properties:
                type: {type: string}
                description: {type: string}
                scope: {type: string}
                allow:
                  type: object
                  properties:
                    namespaces:
                      type: array
                      items: {type: string}
                    selector:
                      type: object
                      additionalProperties: {type: string}
                outputs:
                  type: object
                  properties:
                    env:
                      type: object
                      additionalProperties: {type: string}
                    externalSecrets:
                      type: array
                      items:
                        type: object
                        required: [remoteKeyTemplate]
                        properties:
                          nameTemplate: {type: string}
                          targetSecretNameTemplate: {type: string}
                          refreshInterval: {type: string}
                          secretStoreRef:
                            type: object
                            properties:
                              kind: {type: string}
                              name: {type: string}
                          remoteKeyTemplate: {type: string}
                          data:
                            type: array
                            items:
                              type: object
                              required: [envName, property]
                              properties:
                                envName: {type: string}
                                property: {type: string}
            status:
              type: object
              x-kubernetes-preserve-unknown-fields: true

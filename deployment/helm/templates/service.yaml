{{- if .Values.webhook.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "resource-operator.webhookServiceName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "resource-operator.labels" . | nindent 4 }}
spec:
  selector:
    {{- include "resource-operator.selectorLabels" . | nindent 4 }}
  ports:
    - name: https
      port: {{ .Values.webhook.servicePort }}
      targetPort: webhook
{{- end }}

{{- if .Values.webhook.enabled }}
{{- $secret := lookup "v1" "Secret" .Release.Namespace (include "resource-operator.certSecretName" .) }}
apiVersion: admissionregistration.k8s.io/v1
kind: MutatingWebhookConfiguration
metadata:
  name: {{ include "resource-operator.fullname" . }}-mutating-webhook
  labels:
    {{- include "resource-operator.labels" . | nindent 4 }}
webhooks:
  - name: workload-injection.resources.xfsc.io
    admissionReviewVersions: ["v1"]
    sideEffects: None
    failurePolicy: {{ .Values.webhook.failurePolicy }}
    matchPolicy: Equivalent
    clientConfig:
      {{- if and $secret $secret.data (index $secret.data "ca.crt") }}
      caBundle: {{ index $secret.data "ca.crt" }}
      {{- end }}
      service:
        namespace: {{ .Release.Namespace }}
        name: {{ include "resource-operator.webhookServiceName" . }}
        path: /mutate-workloads
        port: {{ .Values.webhook.servicePort }}
    rules:
      - operations: ["CREATE", "UPDATE"]
        apiGroups: ["apps"]
        apiVersions: ["v1"]
        resources: ["deployments"]
    namespaceSelector:
      {{- toYaml .Values.webhook.namespaceSelector | nindent 6 }}
{{- end }}

{{- if and .Values.webhook.enabled .Values.webhook.certificate.enabled }}
{{- if .Values.webhook.certificate.issuer.create }}
apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: {{ include "resource-operator.issuerName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "resource-operator.labels" . | nindent 4 }}
spec:
  selfSigned: {}
---
{{- end }}
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ include "resource-operator.certName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "resource-operator.labels" . | nindent 4 }}
spec:
  dnsNames:
    - {{ include "resource-operator.webhookServiceName" . }}.{{ .Release.Namespace }}.svc
    - {{ include "resource-operator.webhookServiceName" . }}.{{ .Release.Namespace }}.svc.cluster.local
  issuerRef:
    kind: {{ .Values.webhook.certificate.issuer.kind }}
    name: {{ include "resource-operator.issuerName" . }}
  secretName: {{ include "resource-operator.certSecretName" . }}
{{- end }}

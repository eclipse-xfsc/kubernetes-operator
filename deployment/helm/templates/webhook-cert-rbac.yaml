{{- if and .Values.webhook.enabled .Values.webhook.tls.bootstrap.enabled }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "resource-operator.fullname" . }}-cert-bootstrap
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "resource-operator.labels" . | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "resource-operator.fullname" . }}-cert-bootstrap
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "resource-operator.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "create", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "resource-operator.fullname" . }}-cert-bootstrap
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "resource-operator.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "resource-operator.fullname" . }}-cert-bootstrap
subjects:
  - kind: ServiceAccount
    name: {{ include "resource-operator.fullname" . }}-cert-bootstrap
    namespace: {{ .Release.Namespace }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "resource-operator.fullname" . }}-cert-bootstrap
  labels:
    {{- include "resource-operator.labels" . | nindent 4 }}
rules:
  - apiGroups: ["admissionregistration.k8s.io"]
    resources: ["mutatingwebhookconfigurations"]
    verbs: ["get", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "resource-operator.fullname" . }}-cert-bootstrap
  labels:
    {{- include "resource-operator.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "resource-operator.fullname" . }}-cert-bootstrap
subjects:
  - kind: ServiceAccount
    name: {{ include "resource-operator.fullname" . }}-cert-bootstrap
    namespace: {{ .Release.Namespace }}
{{- end }}

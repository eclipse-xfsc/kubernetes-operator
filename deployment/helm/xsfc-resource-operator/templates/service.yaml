apiVersion: v1
kind: Service
metadata:
  name: xsfc-resource-operator
  namespace: xsfc-system
  labels:
    app: xsfc-resource-operator
spec:
  selector:
    app: xsfc-resource-operator
  ports:
    - name: api
      port: 8088
      targetPort: api
    - name: metrics
      port: 8080
      targetPort: metrics

apiVersion: apps/v1
kind: Deployment
metadata:
  name: example-api
  namespace: app
  annotations:
    inject.xfsc.io/enabled: "true"
    inject.xfsc.io/types: "telemetry,database.postgres"
    inject.xfsc.io/mode: "envFrom"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: example-api
  template:
    metadata:
      labels:
        app: example-api
    spec:
      containers:
        - name: app
          image: nginx:latest

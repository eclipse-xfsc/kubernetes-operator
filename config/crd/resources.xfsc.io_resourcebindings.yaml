apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: resourcebindings.resources.xfsc.io
spec:
  group: resources.xfsc.io
  names:
    kind: ResourceBinding
    listKind: ResourceBindingList
    plural: resourcebindings
    singular: resourcebinding
    shortNames: [rbnd]
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required: [type, providerRef, consumerRef]
              properties:
                type: {type: string}
                providerRef:
                  type: object
                  required: [name]
                  properties:
                    name: {type: string}
                    namespace: {type: string}
                consumerRef:
                  type: object
                  required: [kind, name]
                  properties:
                    apiVersion: {type: string}
                    kind: {type: string}
                    name: {type: string}
                config:
                  type: object
                  properties:
                    env:
                      type: object
                      additionalProperties: {type: string}
                secret:
                  type: object
                  properties:
                    remoteKey: {type: string}
                    targetSecretName: {type: string}
                    refreshInterval: {type: string}
                    storeRef:
                      type: object
                      properties:
                        kind: {type: string}
                        name: {type: string}
                    data:
                      type: array
                      items:
                        type: object
                        required: [envName, property]
                        properties:
                          envName: {type: string}
                          property: {type: string}
                injection:
                  type: object
                  properties:
                    mode: {type: string}
                    containers:
                      type: array
                      items: {type: string}
            status:
              type: object
              x-kubernetes-preserve-unknown-fields: true

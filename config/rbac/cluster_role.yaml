apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: xsfc-resource-operator
rules:
  - apiGroups: [""]
    resources: ["namespaces", "services", "secrets", "configmaps", "serviceaccounts", "events"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets", "daemonsets"]
    verbs: ["get", "list", "watch", "patch", "update"]
  - apiGroups: ["batch"]
    resources: ["jobs", "cronjobs"]
    verbs: ["get", "list", "watch", "patch", "update"]
  - apiGroups: ["resources.xfsc.io"]
    resources: ["resourceprofiles", "resourceprofiles/status"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

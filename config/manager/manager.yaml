apiVersion: apps/v1
kind: Deployment
metadata:
  name: xsfc-resource-operator
  namespace: xsfc-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: xsfc-resource-operator
  template:
    metadata:
      labels:
        app: xsfc-resource-operator
    spec:
      serviceAccountName: xsfc-resource-operator
      containers:
        - name: manager
          image: ghcr.io/eclipse-xfsc/resource-operator:dev
          imagePullPolicy: IfNotPresent
          args:
            - --leader-elect
          ports:
            - containerPort: 9443
              name: webhook
            - containerPort: 8081
              name: health
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
          livenessProbe:
            httpGet:
              path: /healthz
              port: health

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: rootpass
    ports:
      - "0.0.0.0:15432:5432"
    networks:
      - integration
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U root"]
      interval: 3s
      timeout: 3s
      retries: 30

  redis:
    image: redis:7.4-alpine
    command: ["redis-server", "--requirepass", "rootpass"]
    ports:
      - "0.0.0.0:16379:6379"
    networks:
      - integration
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "rootpass", "PING"]
      interval: 3s
      timeout: 3s
      retries: 30

  cassandra:
    build:
      context: ./cassandra
      dockerfile: Dockerfile
    environment:
      CASSANDRA_USER: cassandra
      CASSANDRA_PASSWORD: cassandra
    ports:
      - "0.0.0.0:9042:9042"
    networks:
      - integration
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "cqlsh -u cassandra -p cassandra -e 'DESCRIBE CLUSTER'",
        ]
      interval: 10s
      timeout: 10s
      retries: 40

  minio:
    image: minio/minio:latest
    command: server /data --console-address :9001
    environment:
      MINIO_ROOT_USER: rootaccess
      MINIO_ROOT_PASSWORD: rootsecret123
    ports:
      - "0.0.0.0:19000:9000"
      - "0.0.0.0:19001:9001"
    networks:
      - integration
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 30

  nats:
    image: nats:2.10-alpine
    command: ["-js", "-m", "8222"]
    ports:
      - "0.0.0.0:14222:4222"
      - "0.0.0.0:18222:8222"
    networks:
      - integration
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:8222/healthz"]
      interval: 3s
      timeout: 3s
      retries: 30

networks:
  integration:
    name: xfsc-integration
    driver: bridge
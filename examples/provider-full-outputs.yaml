apiVersion: resources.xfsc.io/v1alpha1
kind: ResourceProvider
metadata:
  name: redis-main
spec:
  type: redis
  adminSecretRef:
    namespace: infrastructure
    name: redis-root
  allow:
    namespaces: [wallet]
  outputs:
    env:
      REDIS_HOST: redis.redis.svc.cluster.local
      REDIS_PORT: "6379"
    externalSecrets:
      - nameTemplate: "{{ .Workload }}-redis"
        targetSecretNameTemplate: "{{ .Workload }}-redis"
        remoteKeyTemplate: "applications/{{ .Namespace }}/{{ .Workload }}/redis"
        secretStoreRef:
          kind: ClusterSecretStore
          name: openbao
        data:
          - envName: REDIS_USERNAME
            property: username
          - envName: REDIS_PASSWORD
            property: password
    config:
      - nameTemplate: "{{ .Workload }}-redis-config"
        data:
          redis.conf: |
            timeout 30
            tcp-keepalive 60
        env:
          REDIS_CONFIG: redis.conf
    jobs:
      - nameTemplate: "{{ .Workload }}-redis-bootstrap"
        yaml: |
          apiVersion: batch/v1
          kind: Job
          metadata:
            name: ignored-by-name-template
          spec:
            backoffLimit: 3
            template:
              spec:
                restartPolicy: OnFailure
                containers:
                  - name: bootstrap
                    image: redis:7.4-alpine
                    command: ["sh", "-c", "redis-cli -h redis.redis.svc.cluster.local ping"]

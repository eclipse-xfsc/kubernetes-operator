apiVersion: v1
kind: Namespace
metadata:
  name: infra
---
apiVersion: v1
kind: Namespace
metadata:
  name: tenant-a
---
apiVersion: resources.xfsc.io/v1alpha1
kind: ResourceProvider
metadata:
  name: redis-default
spec:
  type: redis
  scope: Cluster
  description: Shared Redis provider. Accounts are provisioned externally and stored in OpenBao.
  allow:
    namespaces:
      - tenant-a
  outputs:
    env:
      REDIS_HOST: redis-master.redis.svc.cluster.local
      REDIS_PORT: "6379"
      REDIS_TLS: "true"
      REDIS_CLUSTER: "false"
    externalSecrets:
      - nameTemplate: "{{ workload }}-redis-eso"
        targetSecretNameTemplate: "{{ workload }}-redis"
        refreshInterval: 1h
        secretStoreRef:
          kind: ClusterSecretStore
          name: openbao
        remoteKeyTemplate: "tenants/{{ namespace }}/redis/{{ workload }}"
        data:
          - envName: REDIS_USERNAME
            property: username
          - envName: REDIS_PASSWORD
            property: password

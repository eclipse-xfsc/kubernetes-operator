spec:
  template:
    spec:
      containers:
        - name: app
          env:
            - name: REDIS_HOST
              value: redis-master.redis.svc.cluster.local
            - name: REDIS_PORT
              value: "6379"
            - name: REDIS_TLS
              value: "true"
            - name: REDIS_CLUSTER
              value: "false"
            - name: REDIS_DB
              value: "0"
            - name: REDIS_USERNAME
              valueFrom:
                secretKeyRef:
                  name: wallet-api-redis
                  key: REDIS_USERNAME
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: wallet-api-redis
                  key: REDIS_PASSWORD

apiVersion: resources.xfsc.io/v1alpha1
kind: ResourceBinding
metadata:
  name: wallet-api-redis
  namespace: tenant-a
spec:
  type: redis
  providerRef:
    name: redis-default
    namespace: infra
  consumerRef:
    apiVersion: apps/v1
    kind: Deployment
    name: wallet-api
  # Additional binding-local static config may override/extend provider config.
  config:
    env:
      REDIS_DB: "0"
  secret:
    remoteKey: tenants/tenant-a/redis/wallet-api
    targetSecretName: wallet-api-redis
    refreshInterval: 1h
    data:
      - envName: REDIS_USERNAME
        property: username
      - envName: REDIS_PASSWORD
        property: password
  injection:
    mode: Env
    containers:
      - app
